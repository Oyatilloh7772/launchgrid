<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Склад — LaunchGrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-mount"></div>

<main>
  <section>
    <div class="container">
      <div class="section-head">
        <div><h2>Склад</h2><p>Все товары, остатки и себестоимость</p></div>
        <button class="btn btn-primary" id="open-add-product">+ Добавить товар</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Товар</th><th>Категория</th><th>Остаток</th><th>Цена</th><th>Себестоимость</th><th>Статус</th><th>Действия</th></tr></thead>
          <tbody id="products-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<!-- Модалка добавления/редактирования товара -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 style="font-size:18px;" id="product-modal-title">Добавить товар</h3>
      <button class="modal-close" data-close-modal="product-modal">&times;</button>
    </div>
    <input type="hidden" id="pm-id">
    <div class="field"><label for="pm-name">Название</label><input class="input" id="pm-name" placeholder="Керамическая ваза S"></div>
    <div class="field"><label for="pm-category">Категория</label><input class="input" id="pm-category" placeholder="Декор"></div>
    <div class="grid grid-2">
      <div class="field"><label for="pm-price">Цена продажи (сум)</label><input class="input" type="number" id="pm-price" placeholder="129000"></div>
      <div class="field"><label for="pm-cost">Себестоимость (сум)</label><input class="input" type="number" id="pm-cost" placeholder="60000"></div>
    </div>
    <div class="grid grid-2">
      <div class="field"><label for="pm-qty">Остаток (шт.)</label><input class="input" type="number" id="pm-qty" placeholder="14"></div>
      <div class="field"><label for="pm-threshold">Порог "мало на складе"</label><input class="input" type="number" id="pm-threshold" placeholder="5"></div>
    </div>
    <button class="btn btn-primary btn-block" id="product-save">Сохранить</button>
  </div>
</div>

<!-- Модалка корректировки остатка -->
<div class="modal-overlay" id="adjust-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 style="font-size:18px;">Корректировка остатка</h3>
      <button class="modal-close" data-close-modal="adjust-modal">&times;</button>
    </div>
    <p style="font-size:13px;color:var(--ink-dim);margin-bottom:14px;">Товар: <span id="adjust-name" class="strong" style="color:var(--ink);"></span></p>
    <div class="field"><label for="adjust-delta">Изменение (например -2 или +10)</label><input class="input" type="number" id="adjust-delta" placeholder="-2"></div>
    <button class="btn btn-accent btn-block" id="adjust-save">Применить</button>
  </div>
</div>

<footer>
  <div class="container footer-inner">
    <div class="brand" style="font-size:15px;"><span class="brand-mark" style="width:22px;height:22px;font-size:12px;">L</span>LaunchGrid</div>
    <p>© 2026 LaunchGrid. Демо-версия, данные хранятся локально в браузере.</p>
  </div>
</footer>

<script src="js/mock-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
let CURRENT_USER = null;
let ACTIVE_PRODUCT_ID = null;

document.querySelectorAll('[data-close-modal]').forEach((btn) => btn.addEventListener('click', () => closeModal(btn.dataset.closeModal)));
document.querySelectorAll('.modal-overlay').forEach((ov) => ov.addEventListener('click', (e) => { if (e.target === ov) ov.classList.remove('open'); }));

async function loadTable() {
  const products = await getProducts(CURRENT_USER.id);
  const tbody = document.getElementById('products-tbody');
  if (!products.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--ink-faint);padding:32px;">Пока нет товаров — добавьте первый.</td></tr>`;
    return;
  }
  tbody.innerHTML = products.map((p) => {
    const pct = Math.min(100, Math.round((p.quantity / Math.max(p.lowStockThreshold * 3, 1)) * 100));
    return `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="prod-thumb" style="${thumbStyle(p.name)}">${initials(p.name)}</div>
          <span class="strong">${p.name}</span>
        </div>
      </td>
      <td>${p.category || '—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="mono strong">${p.quantity}</span>
          <div class="stock-bar"><div class="stock-bar-fill" style="width:${pct}%;background:${stockBarColor(p)};"></div></div>
        </div>
      </td>
      <td class="mono">${formatMoney(p.price)}</td>
      <td class="mono">${formatMoney(p.cost)}</td>
      <td>${stockBadge(p)}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" data-adjust="${p.id}">± Остаток</button>
          <button class="btn btn-ghost btn-sm" data-edit="${p.id}">Изменить</button>
          <button class="btn btn-danger btn-sm" data-delete="${p.id}">Удалить</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('[data-edit]').forEach((btn) => btn.addEventListener('click', async () => {
    const p = products.find((x) => x.id === btn.dataset.edit);
    ACTIVE_PRODUCT_ID = p.id;
    document.getElementById('product-modal-title').textContent = 'Изменить товар';
    document.getElementById('pm-id').value = p.id;
    document.getElementById('pm-name').value = p.name;
    document.getElementById('pm-category').value = p.category || '';
    document.getElementById('pm-price').value = p.price;
    document.getElementById('pm-cost').value = p.cost;
    document.getElementById('pm-qty').value = p.quantity;
    document.getElementById('pm-threshold').value = p.lowStockThreshold;
    openModal('product-modal');
  }));
  tbody.querySelectorAll('[data-delete]').forEach((btn) => btn.addEventListener('click', async () => {
    if (!confirm('Удалить товар без возможности восстановления?')) return;
    await deleteProduct(btn.dataset.delete);
    showToast('Товар удалён');
    await loadTable();
  }));
  tbody.querySelectorAll('[data-adjust]').forEach((btn) => btn.addEventListener('click', () => {
    const p = products.find((x) => x.id === btn.dataset.adjust);
    ACTIVE_PRODUCT_ID = p.id;
    document.getElementById('adjust-name').textContent = p.name;
    document.getElementById('adjust-delta').value = '';
    openModal('adjust-modal');
  }));
}

document.getElementById('open-add-product').addEventListener('click', () => {
  ACTIVE_PRODUCT_ID = null;
  document.getElementById('product-modal-title').textContent = 'Добавить товар';
  ['pm-id', 'pm-name', 'pm-category', 'pm-price', 'pm-cost', 'pm-qty', 'pm-threshold'].forEach((id) => (document.getElementById(id).value = ''));
  openModal('product-modal');
});

document.getElementById('product-save').addEventListener('click', async () => {
  const name = document.getElementById('pm-name').value.trim();
  if (!name) { showToast('Укажите название товара', 'error'); return; }
  const payload = {
    name,
    category: document.getElementById('pm-category').value.trim(),
    price: Number(document.getElementById('pm-price').value) || 0,
    cost: Number(document.getElementById('pm-cost').value) || 0,
    quantity: Number(document.getElementById('pm-qty').value) || 0,
    lowStockThreshold: Number(document.getElementById('pm-threshold').value) || 5,
  };
  try {
    if (ACTIVE_PRODUCT_ID) {
      await updateProduct(ACTIVE_PRODUCT_ID, payload);
      showToast('Товар обновлён', 'success');
    } else {
      await addProduct({ ownerId: CURRENT_USER.id, ...payload });
      showToast('Товар добавлен', 'success');
    }
    closeModal('product-modal');
    await loadTable();
  } catch (err) { showToast(err.message, 'error'); }
});

document.getElementById('adjust-save').addEventListener('click', async () => {
  const delta = Number(document.getElementById('adjust-delta').value);
  if (!delta) { showToast('Укажите число', 'error'); return; }
  await adjustStock(ACTIVE_PRODUCT_ID, delta);
  showToast('Остаток обновлён', 'success');
  closeModal('adjust-modal');
  await loadTable();
});

(async () => {
  CURRENT_USER = await requireAuth();
  if (!CURRENT_USER) return;
  await renderNav('inventory');
  await loadTable();
})();
</script>
</body>
</html>
