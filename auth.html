<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — LaunchGrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-mount"></div>

<div class="auth-shell">
  <div class="auth-card card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-signin" data-tab="signin">Вход</div>
      <div class="auth-tab" id="tab-signup" data-tab="signup">Регистрация</div>
    </div>

    <form id="form-signin">
      <div class="field"><label for="si-email">Email</label><input class="input" type="email" id="si-email" placeholder="you@shop.uz" required></div>
      <div class="field"><label for="si-password">Пароль</label><input class="input" type="password" id="si-password" placeholder="••••••••" required></div>
      <button type="submit" class="btn btn-primary btn-block">Войти</button>
      <button type="button" class="btn btn-ghost btn-block" style="margin-top:10px;" id="demo-fill">Заполнить демо-доступом</button>
    </form>

    <form id="form-signup" style="display:none;">
      <div class="field"><label for="su-business">Название бизнеса</label><input class="input" id="su-business" placeholder="Например, Cactus Home Decor" required></div>
      <div class="field"><label for="su-email">Email</label><input class="input" type="email" id="su-email" placeholder="you@shop.uz" required></div>
      <div class="field"><label for="su-password">Пароль</label><input class="input" type="password" id="su-password" placeholder="Минимум 6 символов" minlength="6" required></div>
      <button type="submit" class="btn btn-primary btn-block">Создать аккаунт</button>
      <p style="font-size:12px;color:var(--ink-faint);margin-top:14px;text-align:center;">Начинаете на тарифе Free — перейти на Business можно позже в настройках.</p>
    </form>
  </div>
</div>

<script src="js/mock-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
function setTab(tab) {
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
}
document.getElementById('tab-signin').addEventListener('click', () => setTab('signin'));
document.getElementById('tab-signup').addEventListener('click', () => setTab('signup'));

const params = new URLSearchParams(window.location.search);
if (params.get('mode') === 'signup') setTab('signup');

document.getElementById('demo-fill').addEventListener('click', () => {
  document.getElementById('si-email').value = DEMO_ACCOUNT.email;
  document.getElementById('si-password').value = DEMO_ACCOUNT.password;
});

document.getElementById('form-signin').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await signIn({ email: document.getElementById('si-email').value.trim(), password: document.getElementById('si-password').value });
    showToast('Добро пожаловать!', 'success');
    setTimeout(() => (window.location.href = 'dashboard.html'), 400);
  } catch (err) { showToast(err.message, 'error'); }
});

document.getElementById('form-signup').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await signUp({
      businessName: document.getElementById('su-business').value.trim(),
      email: document.getElementById('su-email').value.trim(),
      password: document.getElementById('su-password').value,
    });
    showToast('Аккаунт создан!', 'success');
    setTimeout(() => (window.location.href = 'dashboard.html'), 400);
  } catch (err) { showToast(err.message, 'error'); }
});

(async () => {
  const user = await renderNav();
  if (user) window.location.href = 'dashboard.html';
})();
</script>
</body>
</html>
